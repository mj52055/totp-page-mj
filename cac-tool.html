<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CAC I1 报文解析工具</title><style>body{font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:#f6f7fb;margin:0;color:#18202f}.wrap{max-width:1050px;margin:32px auto;padding:0 18px}.card{background:white;border:1px solid #e5e7ef;border-radius:18px;box-shadow:0 10px 30px #2331}.head{padding:22px 24px;border-bottom:1px solid #edf0f6}.head h1{margin:0 0 8px;font-size:24px}.head p{margin:0;color:#667085}.body{padding:22px 24px}.row{display:grid;grid-template-columns:1fr;gap:16px}textarea{width:100%;min-height:150px;box-sizing:border-box;border:1px solid #d0d5dd;border-radius:12px;padding:14px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:14px;resize:vertical}button{border:0;border-radius:12px;background:#1f63ff;color:white;padding:12px 18px;font-weight:700;cursor:pointer}button.secondary{background:#eef2ff;color:#1f3a8a}pre{white-space:pre-wrap;background:#0b1020;color:#dce7ff;padding:18px;border-radius:14px;overflow:auto;min-height:260px}.tips{font-size:13px;color:#667085;line-height:1.6}.ok{color:#039855}.bad{color:#d92d20}</style></head><body><div class="wrap"><div class="card"><div class="head"><h1>CAC I1 十六进制报文解析工具</h1><p>从 JAR 静态迁移：本页面不依赖后端，直接在浏览器解析报文并输出 JSON。</p></div><div class="body"><div class="row"><textarea id="input" placeholder="粘贴十六进制报文，例如：A5 5A ... 96"></textarea><div><button onclick="run()">解析</button> <button class="secondary" onclick="demoClean()">清空</button></div><div class="tips">校验规则与 JAR 一致：长度 ≥ 28，头 <b>A5 5A</b>，尾 <b>96</b>，CRC16(Modbus) 校验范围为去掉头 2 字节、CRC 2 字节和尾 1 字节后的内容。CRC 在尾前两字节。</div><pre id="out">等待输入...</pre></div></div></div></div><script>
const FrameType={1:'HEART_BEAT',2:'HEART_BEAT_CFM',3:'VOLT_DATA',4:'VOLT_DATA_CFM',5:'DATA_ASK',6:'DATA_ASK_CFM',7:'CONF_STATUS',8:'CONF_STATUS_CFM',9:'DATA_FLOW',16:'DATA_FLOW_CFM',17:'EVENT_DATA',18:'EVENT_DATA_CFM',19:'UPLOAD',20:'UPLOAD_CFM'};
const PacketType={1:'HEART_BEAT',4:'REAL_TIME_DATA',5:'DAY_STAT_DATA',6:'MONTH_STAT_DATA',161:'DATA_ASK',164:'TIME_QUERY_SET',166:'NETWORK_PARAM_QUERY_SET',167:'PARAM_QUERY_SET',168:'EVENT_PARAM_QUERY_SET',169:'DEVICE_CAC_QUERY_SET',170:'BASE_INFO_QUERY',171:'WORK_STATE_QUERY',173:'DEVICE_ID_QUERY_SET',174:'DEVICE_RESET',175:'DEVICE_DEBUG',193:'TRAFFIC_DATA',196:'EVENT_DATA',199:'UPLOAD_START',200:'UPLOAD_EXECUTE',201:'UPLOAD_END'};
function cleanHex(s){return (s||'').replace(/[^0-9a-fA-F]/g,'').toUpperCase()}
function hexToBytes(s){s=cleanHex(s); if(s.length%2) throw Error('十六进制长度不是偶数'); const a=[]; for(let i=0;i<s.length;i+=2)a.push(parseInt(s.slice(i,i+2),16)); return a}
function hex(a){return a.map(x=>(x&255).toString(16).toUpperCase().padStart(2,'0')).join('')}
function ascii(a){return a.map(b=>String.fromCharCode(b&255)).join('').trim()}
function slice(b,i,n){return b.slice(i,i+n)}
function u8(b,i){return (b[i]??0)&255}
function leInt(a){let v=0; for(let i=0;i<a.length;i++) v += (a[i]&255) << (8*i); return v>>>0}
function date(a){const sec=leInt(a); if(!sec) return null; const d=new Date(sec*1000); return isNaN(d)?null:d.toISOString().replace('T',' ').replace('.000Z','')}
function bcdStr(a){let r=[...a].reverse().map(x=>''+((x>>4)&15)+(x&15)).join(''); return r.startsWith('0')?r.slice(1):r}
function bcdVolt(a){if(hex(a)==='FFFFFFFF') return 1666666.62; const n=Number(bcdStr(a)); return n===0?0:n/100}
function bcdRate(a){const n=Number(bcdStr(a)); return n===0?0:n/1000}
function version(a){return a.map(x=>u8([x],0)).join('.')}
function crc16Modbus(bytes,swap=false){let crc=0xFFFF; for(const by of bytes){crc ^= by&255; for(let i=0;i<8;i++) crc=(crc&1)?((crc>>>1)^0xA001):(crc>>>1)} if(swap) crc=((crc&0xFF00)>>>8)|((crc&0xFF)<<8); return crc.toString(16).toUpperCase().padStart(4,'0')}
function checkCrc(bytes){const expected=hex(bytes.slice(bytes.length-3,bytes.length-1)); const body=bytes.slice(2,bytes.length-3); return {ok:expected===crc16Modbus(body,false), expected, actual:crc16Modbus(body,false)}}
function normal(b,hasPoint=false){const o={deviceId:ascii(slice(b,4,17)),frameType:FrameType[u8(b,21)]||`UNKNOWN_${hex([u8(b,21)])}`,packetType:PacketType[u8(b,22)]||`UNKNOWN_${hex([u8(b,22)])}`,frameNo:u8(b,23)}; if(hasPoint)o.measurePointNo=u8(b,24); return o}
function parseStat(b){const n=u8(b,25), list=[]; for(let i=0;i<n;i++){const base=26+i*41; list.push({dataTime:date(slice(b,base,4)),voltPassRate:bcdRate(slice(b,base+4,3)),beyondUpperLimit:bcdRate(slice(b,base+7,3)),underLowerLimit:bcdRate(slice(b,base+10,3)),totalTime:leInt(slice(b,base+13,2)),qualifiedTime:leInt(slice(b,base+15,2)),beyondUpperTime:leInt(slice(b,base+17,2)),underLowerTime:leInt(slice(b,base+19,2)),voltAvgValue:bcdVolt(slice(b,base+21,4)),voltMinValue:bcdVolt(slice(b,base+25,4)),voltMinValueTime:date(slice(b,base+29,4)),voltMaxValue:bcdVolt(slice(b,base+33,4)),voltMaxValueTime:date(slice(b,base+37,4))})} return list}
function parse(b){const ft=u8(b,21), pt=u8(b,22); let o=normal(b,[3,5,170,171].includes(pt)); if(ft===1&&pt===1){o.data={clockTime:date(slice(b,24,4)),status:'NORMAL'};return o} if(ft===3&&pt===4){const n=u8(b,25),list=[]; for(let i=0;i<n;i++){const base=26+i*8; list.push({time:date(slice(b,base,4)),volt:bcdVolt(slice(b,base+4,4))})} o.data={dateNum:n,list};return o} if(ft===3&&(pt===5||pt===6)){o.data=parseStat(b);return o} if(ft===6&&pt===161){o.data={requestType:PacketType[u8(b,25)]||hex([u8(b,25)]),startTime:date(slice(b,26,4)),endTime:date(slice(b,30,4)),resultCode:'0'};o.dataStatus=u8(b,34)===1?1:2;return o} if(ft===8&&pt===164){o.dataStatus=u8(b,24)===1?1:2;o.data=date(slice(b,25,4));return o} if(ft===8&&pt===170){o.data={vmdModel:ascii(slice(b,24,10)),hardwareVersion:version(slice(b,34,4)),softwareVersion:version(slice(b,38,4)),protocolVersion:version(slice(b,42,4)),bsProductionDate:date(slice(b,66,4)),bsIdentifier:ascii(slice(b,70,20)),vmdImsiNumber:ascii(slice(b,90,15)),vmdPhoneNumber:ascii(slice(b,105,11))};return o} if(ft===8&&pt===169){o.dataStatus=u8(b,24)===1?1:2;o.data=version(slice(b,26,4));return o} if(ft===8&&pt===173){o.dataStatus=u8(b,24)===1?1:2;o.data=ascii(slice(b,25,17));return o} if(ft===9&&pt===193){o.data={statTime:date(slice(b,24,4))};return o} if(ft===17&&pt===196){o.data=hex([u8(b,24)]);return o} o.warning='该报文类型在页面中以公共字段解析；完整业务字段可继续按 JAR 方法补充。'; o.rawPayload=hex(slice(b,24,Math.max(0,b.length-27))); return o}
function run(){const out=document.getElementById('out'); try{const bytes=hexToBytes(document.getElementById('input').value); const checks=[]; if(bytes.length<28) checks.push('长度小于 28'); if(u8(bytes,0)!==0xA5||u8(bytes,1)!==0x5A) checks.push('头部不是 A5 5A'); if(u8(bytes,bytes.length-1)!==0x96) checks.push('尾部不是 96'); const crc=bytes.length>=6?checkCrc(bytes):{ok:false}; if(!crc.ok) checks.push(`CRC 不匹配：报文=${crc.expected||'-'}，计算=${crc.actual||'-'}`); const result={valid:checks.length===0,checks:checks.length?checks:['OK'],crc,parsed:checks.length?null:parse(bytes),hex:hex(bytes)}; out.innerHTML='<span class="'+(result.valid?'ok':'bad')+'">'+(result.valid?'解析成功':'校验失败')+'</span>\n'+escapeHtml(JSON.stringify(result,null,2))}catch(e){out.innerHTML='<span class="bad">错误</span>\n'+escapeHtml(e.message)}}
function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))} function demoClean(){document.getElementById('input').value='';document.getElementById('out').textContent='等待输入...'}
</script></body></html>
